version: 1
applications:
  - appRoot: frontend
    frontend:
      phases:
        preBuild:
          commands:
            - npm ci
            # Amplify app env vars exist at build time but NOT in the Next.js SSR
            # runtime — bake them into .env.production so the server reads them.
            - env | grep -E '^TOKENMOTH_|^NEXT_PUBLIC_' >> .env.production || true
        build:
          commands:
            - npm run build
      artifacts:
        baseDirectory: .next
        files:
          - "**/*"
      cache:
        paths:
          - node_modules/**/*
          - .next/cache/**/*
