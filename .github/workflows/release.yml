name: release

# Reproducible CLI build + publish to the public S3 distribution bucket.
# MANUAL trigger (Actions tab → Run workflow): pass an existing git tag; the
# build checks out that immutable tag and publishes tokenmoth-<target>.tar.gz
# to s3://tokenmoth-dist/ via OIDC (no long-lived AWS keys).
on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Git tag to build + publish (must already exist, e.g. cli-v0.1.1)"
        required: true

# id-token: write is required for AWS OIDC role assumption.
permissions:
  contents: read
  id-token: write

env:
  AWS_REGION: eu-central-1
  S3_BUCKET: tokenmoth-dist
  # OIDC role scoped to s3:PutObject for this repo. NOTE: the role policy must
  # allow BOTH tokenmoth-dist/tokenmoth-*.tar.gz* (latest keys) AND
  # tokenmoth-dist/releases/* (versioned keys).
  ROLE_ARN: arn:aws:iam::551504153648:role/tokenmoth-ci-s3-publish

jobs:
  build:
    name: build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
          - target: x86_64-pc-windows-msvc
            os: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag }}

      # The npm package version is derived from the tag, and npm's postinstall
      # fetches releases/v<version>/… — so the Cargo crate version must match
      # the tag or the published binary would report the wrong version.
      - name: Assert Cargo version matches tag
        shell: bash
        run: |
          tag="${{ inputs.tag }}"; tag_ver="${tag#cli-v}"
          cargo_ver="$(grep -m1 '^version' backend/crates/cli/Cargo.toml | sed -E 's/.*"(.*)".*/\1/')"
          if [[ "$cargo_ver" != "$tag_ver" ]]; then
            echo "::error::backend/crates/cli/Cargo.toml version ($cargo_ver) does not match tag version ($tag_ver) — bump the crate version and re-tag."
            exit 1
          fi
          echo "✓ Cargo version $cargo_ver matches tag $tag"

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install aarch64 linux cross-linker
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Build CLI
        working-directory: backend
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
        run: cargo build --release -p tokenmoth-cli --target ${{ matrix.target }}

      # bash on every runner (Git Bash on Windows) so the tar/.exe handling is
      # uniform. Windows builds carry a `.exe`; the archive name convention
      # (tokenmoth-<target>.tar.gz, binary `tokenmoth[.exe]` inside) is unchanged.
      - name: Package
        shell: bash
        run: |
          ext=""; [[ "${{ matrix.target }}" == *windows* ]] && ext=".exe"
          bin="backend/target/${{ matrix.target }}/release/tokenmoth${ext}"
          tar -czf "tokenmoth-${{ matrix.target }}.tar.gz" -C "$(dirname "$bin")" "tokenmoth${ext}"
          # sha256 sidecar — lets curl users verify the download.
          if command -v sha256sum >/dev/null; then
            sha256sum "tokenmoth-${{ matrix.target }}.tar.gz" | awk '{print $1}' > "tokenmoth-${{ matrix.target }}.tar.gz.sha256"
          else
            shasum -a 256 "tokenmoth-${{ matrix.target }}.tar.gz" | awk '{print $1}' > "tokenmoth-${{ matrix.target }}.tar.gz.sha256"
          fi

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Publish to S3
        shell: bash
        run: |
          tag="${{ inputs.tag }}"; ver="${tag#cli-v}"
          for f in "tokenmoth-${{ matrix.target }}.tar.gz" "tokenmoth-${{ matrix.target }}.tar.gz.sha256"; do
            # Versioned key — immutable, never rewritten, so cache forever.
            # npm's postinstall fetches this path (pinned to its own version).
            aws s3 cp "$f" \
              "s3://${{ env.S3_BUCKET }}/releases/v${ver}/${f}" \
              --region "${{ env.AWS_REGION }}" \
              --cache-control "public, max-age=31536000, immutable"
            # "Latest" key (back-compat for the curl|sh installers) — short
            # cache-control so a new release propagates through CloudFront
            # within minutes (same URL each release). CloudFront's
            # CachingOptimized policy honors these origin headers.
            aws s3 cp "$f" \
              "s3://${{ env.S3_BUCKET }}/${f}" \
              --region "${{ env.AWS_REGION }}" \
              --cache-control "public, max-age=300, must-revalidate"
          done

  # ── npm channel ──────────────────────────────────────────────────────────
  # `npm i -g tokenmoth` / `npx tokenmoth`. Highest-reach path for the Claude
  # Code audience (everyone already has Node). The package itself ships no
  # binary — its postinstall downloads the artifacts the build job just pushed.
  publish-npm:
    name: publish npm
    needs: build
    runs-on: ubuntu-latest
    if: ${{ vars.PUBLISH_NPM == 'true' }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag }}
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"
      - name: Set version from tag
        working-directory: npm
        # tag cli-vX.Y.Z → package version X.Y.Z (no git tag/commit side effects).
        run: |
          ver="${{ inputs.tag }}"; ver="${ver#cli-v}"
          npm version "$ver" --no-git-tag-version --allow-same-version
      - name: Publish
        working-directory: npm
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
