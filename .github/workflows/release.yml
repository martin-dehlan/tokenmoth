name: release

# Cut a release by pushing a tag, e.g. `git tag v0.1.0 && git push origin v0.1.0`.
# Builds the `tokenmoth` CLI for macOS + Linux (arm64/x64) and attaches tarballs.
on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    name: build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install aarch64 linux cross-linker
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Build CLI
        working-directory: backend
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
        run: cargo build --release -p tokenmoth-cli --target ${{ matrix.target }}

      - name: Package
        run: |
          bin="backend/target/${{ matrix.target }}/release/tokenmoth"
          tar -czf "tokenmoth-${{ matrix.target }}.tar.gz" -C "$(dirname "$bin")" tokenmoth

      - name: Attach to release
        uses: softprops/action-gh-release@v2
        with:
          files: tokenmoth-${{ matrix.target }}.tar.gz
