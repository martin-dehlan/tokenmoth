name: release

# Reproducible CLI build + publish to the public S3 distribution bucket.
# MANUAL trigger (Actions tab → Run workflow): pass an existing git tag; the
# build checks out that immutable tag and publishes tokenmoth-<target>.tar.gz
# to s3://tokenmoth-dist/ via OIDC (no long-lived AWS keys).
on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Git tag to build + publish (must already exist, e.g. cli-v0.1.1)"
        required: true

# id-token: write is required for AWS OIDC role assumption.
permissions:
  contents: read
  id-token: write

env:
  AWS_REGION: eu-central-1
  S3_BUCKET: tokenmoth-dist
  # OIDC role scoped to s3:PutObject on tokenmoth-dist/tokenmoth-*.tar.gz for this repo.
  ROLE_ARN: arn:aws:iam::<account-id>:role/tokenmoth-ci-s3-publish

jobs:
  build:
    name: build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
          - target: x86_64-pc-windows-msvc
            os: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag }}

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install aarch64 linux cross-linker
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Build CLI
        working-directory: backend
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
        run: cargo build --release -p tokenmoth-cli --target ${{ matrix.target }}

      # bash on every runner (Git Bash on Windows) so the tar/.exe handling is
      # uniform. Windows builds carry a `.exe`; the archive name convention
      # (tokenmoth-<target>.tar.gz, binary `tokenmoth[.exe]` inside) is unchanged.
      - name: Package
        shell: bash
        run: |
          ext=""; [[ "${{ matrix.target }}" == *windows* ]] && ext=".exe"
          bin="backend/target/${{ matrix.target }}/release/tokenmoth${ext}"
          tar -czf "tokenmoth-${{ matrix.target }}.tar.gz" -C "$(dirname "$bin")" "tokenmoth${ext}"
          # sha256 sidecar — Homebrew needs it, and it lets curl users verify.
          if command -v sha256sum >/dev/null; then
            sha256sum "tokenmoth-${{ matrix.target }}.tar.gz" | awk '{print $1}' > "tokenmoth-${{ matrix.target }}.tar.gz.sha256"
          else
            shasum -a 256 "tokenmoth-${{ matrix.target }}.tar.gz" | awk '{print $1}' > "tokenmoth-${{ matrix.target }}.tar.gz.sha256"
          fi

      # Hand the checksum to the homebrew job (rendered after all builds finish).
      - name: Upload sha256 artifact
        uses: actions/upload-artifact@v4
        with:
          name: sha256-${{ matrix.target }}
          path: tokenmoth-${{ matrix.target }}.tar.gz.sha256

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Publish to S3
        shell: bash
        run: |
          aws s3 cp "tokenmoth-${{ matrix.target }}.tar.gz" \
            "s3://${{ env.S3_BUCKET }}/tokenmoth-${{ matrix.target }}.tar.gz" \
            --region "${{ env.AWS_REGION }}"
          aws s3 cp "tokenmoth-${{ matrix.target }}.tar.gz.sha256" \
            "s3://${{ env.S3_BUCKET }}/tokenmoth-${{ matrix.target }}.tar.gz.sha256" \
            --region "${{ env.AWS_REGION }}"

  # ── npm channel ──────────────────────────────────────────────────────────
  # `npm i -g tokenmoth` / `npx tokenmoth`. Highest-reach path for the Claude
  # Code audience (everyone already has Node). The package itself ships no
  # binary — its postinstall downloads the artifacts the build job just pushed.
  publish-npm:
    name: publish npm
    needs: build
    runs-on: ubuntu-latest
    if: ${{ vars.PUBLISH_NPM == 'true' }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag }}
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"
      - name: Set version from tag
        working-directory: npm
        # tag cli-vX.Y.Z → package version X.Y.Z (no git tag/commit side effects).
        run: |
          ver="${{ inputs.tag }}"; ver="${ver#cli-v}"
          npm version "$ver" --no-git-tag-version --allow-same-version
      - name: Publish
        working-directory: npm
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  # ── Homebrew channel ─────────────────────────────────────────────────────
  # Render dist/homebrew/tokenmoth.rb with the version + checksums and push it
  # to the public tap repo so `brew install martin-dehlan/tokenmoth/tokenmoth`
  # tracks the release. Requires a HOMEBREW_TAP_TOKEN PAT with repo write.
  homebrew:
    name: update homebrew tap
    needs: build
    runs-on: ubuntu-latest
    if: ${{ vars.PUBLISH_HOMEBREW == 'true' }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag }}
      - name: Download checksums
        uses: actions/download-artifact@v4
        with:
          pattern: sha256-*
          path: sha256
          merge-multiple: true
      - name: Render formula
        run: |
          ver="${{ inputs.tag }}"; ver="${ver#cli-v}"
          f=dist/homebrew/tokenmoth.rb
          sed -i "s/{{VERSION}}/$ver/" "$f"
          for t in aarch64-apple-darwin x86_64-apple-darwin \
                   aarch64-unknown-linux-gnu x86_64-unknown-linux-gnu; do
            sum="$(cat "sha256/tokenmoth-$t.tar.gz.sha256")"
            key="$(echo "$t" | tr 'a-z-' 'A-Z_')"   # e.g. AARCH64_APPLE_DARWIN
            sed -i "s/{{SHA256_$key}}/$sum/" "$f"
          done
          cat "$f"
      - name: Push to tap
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          ver="${{ inputs.tag }}"; ver="${ver#cli-v}"
          git clone "https://x-access-token:${GH_TOKEN}@github.com/martin-dehlan/homebrew-tokenmoth.git" tap
          mkdir -p tap/Formula
          cp dist/homebrew/tokenmoth.rb tap/Formula/tokenmoth.rb
          cd tap
          git config user.name "tokenmoth-ci"
          git config user.email "ci@tokenmoth.com"
          git add Formula/tokenmoth.rb
          git commit -m "tokenmoth $ver" || { echo "no formula change"; exit 0; }
          git push
