name: gitleaks

# Server-side secret scan on every push/PR — backstop for the local pre-commit hook.
on:
  push:
  pull_request:

# gitleaks-action posts a summary comment on PRs; without pull-requests:write the
# default read-only token 403s ("Resource not accessible by integration") and the
# pull_request run fails even when no secret is found.
permissions:
  contents: read
  pull-requests: write

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
