# Durable local tokenmoth stack: Postgres + API, always-on (restart unless-stopped).
#   docker compose up -d --build
# The API self-runs migrations and bootstraps the API key below on first start.
services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: tokenmoth
    volumes:
      - tokenmoth_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d tokenmoth"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgres://postgres:postgres@db:5432/tokenmoth
      BIND_ADDR: 0.0.0.0:8080
      RUST_LOG: tokenmoth_api=info,tower_http=info
      TOKENMOTH_RATE_PER_MIN: 120
      # Single-user bootstrap — change this to your own secret key.
      TOKENMOTH_BOOTSTRAP_KEY: tm_user_123
      TOKENMOTH_BOOTSTRAP_EMAIL: me@tokenmoth.local
      TOKENMOTH_ADMIN_TOKEN: tm_admin_dev
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  tokenmoth_pg:
