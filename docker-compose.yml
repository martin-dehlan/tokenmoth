# Durable local tokenrat stack: Postgres + API, always-on (restart unless-stopped).
#   docker compose up -d --build
# The API self-runs migrations and bootstraps the API key below on first start.
services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: tokenrat
    volumes:
      - tokenrat_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d tokenrat"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgres://postgres:postgres@db:5432/tokenrat
      BIND_ADDR: 0.0.0.0:8080
      RUST_LOG: tokenrat_api=info,tower_http=info
      # Single-user bootstrap — change this to your own secret key.
      TOKENRAT_BOOTSTRAP_KEY: tf_user_123
      TOKENRAT_BOOTSTRAP_EMAIL: me@tokenrat.local
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  tokenrat_pg:
